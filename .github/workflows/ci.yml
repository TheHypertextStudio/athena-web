name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Turbo Remote Cache (optional): set these to share the cache across CI runs and machines so a
# task computed on one run is replayed on the next. All unset → turbo silently uses the local
# `.turbo` cache only (current behavior, no-op). When TURBO_TOKEN is set, the signature key is
# required by `remoteCache.signature` in turbo.json. For a self-hosted cache also set TURBO_API
# (repo variable); omit it to use the Vercel Remote Cache.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  # Lint + typecheck run together — same install, no reason for separate runners.
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install -g corepack@0.35.0 && corepack enable

      # Turbo task cache — on exact SHA hit turbo replays outputs without re-running.
      # restore-keys falls back to the nearest ancestor commit's cache so only
      # tasks whose inputs changed are re-executed.
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-quality-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-quality-${{ runner.os }}-

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm turbo run lint typecheck --cache-dir=.turbo

      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Tests run in local/pglite mode — skip prod env validation.
      SKIP_ENV_VALIDATION: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install -g corepack@0.35.0 && corepack enable

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-test-${{ runner.os }}-

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm turbo run test --cache-dir=.turbo

      - id: coverage
        if: always()
        run: |
          if find . -path '*/coverage/*' \( -name 'coverage-final.json' -o -name 'lcov.info' -o -name '*.xml' \) -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Upload only when a test task actually generated coverage files.
      - uses: codecov/codecov-action@v7
        if: always() && steps.coverage.outputs.found == 'true'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Browser e2e against the real dev stack (portless HTTPS + Next dev + Hono API + PGlite),
  # exactly the topology `pnpm dev` gives a developer — including the MCP OAuth flows
  # (register → consent → token → Bearer /mcp), which .env.local enables locally.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install -g corepack@0.35.0 && corepack enable

      - run: pnpm install --no-frozen-lockfile

      # The dev stack lives on the *.docket.localhost family; systemd-resolved usually
      # synthesizes loopback for *.localhost, but pin it so name resolution is never the flake.
      - name: Map dev hosts to loopback
        run: echo "127.0.0.1 docket.localhost api.docket.localhost admin.docket.localhost marketing.docket.localhost" | sudo tee -a /etc/hosts

      # portless terminates HTTPS on :443 (privileged ⇒ sudo) and routes each dev app by host.
      # The self-signed CA is fine: Playwright runs with ignoreHTTPSErrors, and portless
      # injects NODE_EXTRA_CA_CERTS into the apps it launches.
      - name: Start portless proxy
        run: sudo -E node node_modules/.bin/portless proxy start --port 443 --https --skip-trust &

      - name: Start dev stack
        run: pnpm dev > /tmp/dev.log 2>&1 &

      - run: pnpm --filter @docket/web exec playwright install --with-deps chromium

      - name: Wait for the stack
        run: |
          for i in $(seq 1 120); do
            web=$(curl -sk -o /dev/null -w "%{http_code}" https://docket.localhost || true)
            api=$(curl -sk -o /dev/null -w "%{http_code}" https://api.docket.localhost/v1/health || true)
            oidc=$(curl -sk -o /dev/null -w "%{http_code}" https://api.docket.localhost/api/auth/.well-known/oauth-authorization-server || true)
            echo "web=$web api=$api oidc=$oidc"
            if [ "$web" = "200" ] && [ "$api" = "200" ] && [ "$oidc" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "dev stack never became ready" >&2
          tail -100 /tmp/dev.log >&2
          exit 1

      - run: pnpm --filter @docket/web test:e2e

      - name: Dev stack log on failure
        if: failure()
        run: tail -200 /tmp/dev.log

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
