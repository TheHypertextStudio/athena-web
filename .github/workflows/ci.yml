name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + typecheck run together — same install, no reason for separate runners.
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - run: corepack enable

      # Turbo task cache — on exact SHA hit turbo replays outputs without re-running.
      # restore-keys falls back to the nearest ancestor commit's cache so only
      # tasks whose inputs changed are re-executed.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-quality-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-quality-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run lint typecheck --cache-dir=.turbo

      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Tests run in local/pglite mode — skip prod env validation.
      SKIP_ENV_VALIDATION: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-test-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run test --cache-dir=.turbo

      # Upload even on partial test failure so coverage doesn't silently drop.
      - uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
