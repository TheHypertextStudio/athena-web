name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Turbo Remote Cache (optional): set these to share the cache across CI runs and machines so a
# task computed on one run is replayed on the next. All unset → turbo silently uses the local
# `.turbo` cache only (current behavior, no-op). When TURBO_TOKEN is set, the signature key is
# required by `remoteCache.signature` in turbo.json. For a self-hosted cache also set TURBO_API
# (repo variable); omit it to use the Vercel Remote Cache.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  # Lint + typecheck run together — same install, no reason for separate runners.
  quality:
    name: Lint & Types
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install -g corepack@0.35.0 && corepack enable

      # Turbo task cache — on exact SHA hit turbo replays outputs without re-running.
      # restore-keys falls back to the nearest ancestor commit's cache so only
      # tasks whose inputs changed are re-executed.
      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-quality-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-quality-${{ runner.os }}-

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm turbo run lint typecheck --cache-dir=.turbo

      - run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Tests run in local/pglite mode — skip prod env validation.
      SKIP_ENV_VALIDATION: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install -g corepack@0.35.0 && corepack enable

      - uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-test-${{ runner.os }}-

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm turbo run test --cache-dir=.turbo

      - id: coverage
        if: always()
        run: |
          if find . -path '*/coverage/*' \( -name 'coverage-final.json' -o -name 'lcov.info' -o -name '*.xml' \) -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      # Upload only when a test task actually generated coverage files.
      - uses: codecov/codecov-action@v7
        if: always() && steps.coverage.outputs.found == 'true'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
