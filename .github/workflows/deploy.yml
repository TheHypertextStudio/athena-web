name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docket
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: NODE_VERSION=${{ steps.node-ver.outputs.value }}

      - id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-api
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
            API_URL=${{ vars.API_URL }}
            BETTER_AUTH_URL=${{ vars.API_URL }}
            BETTER_AUTH_TRUSTED_ORIGINS=${{ vars.WEB_URL }}\,${{ vars.ADMIN_URL }}
            BETTER_AUTH_PASSKEY_RP_ID=${{ vars.PASSKEY_RP_ID }}
            BETTER_AUTH_PASSKEY_RP_NAME=Docket
            BILLING_ENABLED=false
            MCP_TASKS_ENABLED=false
            MCP_CIMD_STRICT=true
          secrets: |
            DATABASE_URL=docket-database-url:latest
            BETTER_AUTH_SECRET=docket-auth-secret:latest
            CRON_SECRET=docket-cron-secret:latest

      - name: Show Cloud Run URL
        run: echo "docket-api=${{ steps.deploy-api.outputs.url }}"

      # Background sync (a core feature) only fires if Cloud Scheduler calls the cron endpoint.
      # Re-running this idempotent create-or-update every deploy guarantees the jobs exist and
      # stay current — never a forgotten manual step. gcloud is already authenticated (WIF).
      - name: Ensure Cloud Scheduler jobs
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          API_URL: ${{ vars.API_URL }}
        run: npx -y tsx scripts/scheduler-setup.ts

  deploy-web:
    name: Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}

      - id: deploy-web
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-web
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/web:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
          secrets: |
            BETTER_AUTH_SECRET=docket-auth-secret:latest

      - name: Show Cloud Run URL
        run: echo "docket-web=${{ steps.deploy-web.outputs.url }}"

  deploy-admin:
    name: Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}

      - id: deploy-admin
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-admin
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production

      - name: Show Cloud Run URL
        run: echo "docket-admin=${{ steps.deploy-admin.outputs.url }}"
