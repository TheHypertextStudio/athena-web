name: Deploy production

on:
  workflow_call:

env:
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docket
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Migrate database and deploy API
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: NODE_VERSION=${{ steps.node-ver.outputs.value }}

      - name: Apply production database migrations
        env:
          API_IMAGE: ${{ env.REGISTRY }}/api:${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          set +x
          DATABASE_URL_UNPOOLED="$(gcloud secrets versions access latest \
            --secret=docket-database-url-unpooled \
            --project='${{ vars.GCP_PROJECT_ID }}')"
          export DATABASE_URL_UNPOOLED
          docker pull "$API_IMAGE"
          docker run --rm \
            --env DATABASE_URL_UNPOOLED \
            "$API_IMAGE" \
            node --import=tsx/esm /app/packages/db/src/migrate.ts

      - name: Write Cloud Run environment configuration
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/docket-api-env.yaml" <<'EOF'
          NODE_ENV: production
          APP_MODE: production
          API_URL: "${{ vars.API_URL }}"
          WEB_URL: "${{ vars.WEB_URL }}"
          BETTER_AUTH_URL: "${{ vars.API_URL }}"
          BETTER_AUTH_TRUSTED_ORIGINS: "${{ vars.WEB_URL }},${{ vars.ADMIN_URL }}"
          BETTER_AUTH_ALLOWED_HOSTS: "${{ vars.BETTER_AUTH_ALLOWED_HOSTS }}"
          BETTER_AUTH_PASSKEY_RP_ID: "${{ vars.PASSKEY_RP_ID }}"
          BETTER_AUTH_PASSKEY_RP_NAME: Docket
          GOOGLE_CALENDAR_WEBHOOK_URL: "${{ vars.API_URL }}/webhooks/calendar/google"
          GOOGLE_OAUTH_PUBLIC: "${{ vars.GOOGLE_OAUTH_PUBLIC }}"
          GOOGLE_OAUTH_TEST_EMAILS: "${{ vars.GOOGLE_OAUTH_TEST_EMAILS }}"
          BILLING_ENABLED: "false"
          MCP_ALLOWED_ORIGINS: "${{ vars.WEB_URL }},https://claude.ai,https://claude.com"
          MCP_TASKS_ENABLED: "false"
          MCP_CIMD_STRICT: "true"
          EOF

      - id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-api
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --env-vars-file=${{ runner.temp }}/docket-api-env.yaml
          # Bootstrap owns this non-secret env→Secret Manager mapping. Optional providers are
          # mounted only after their secrets exist. Overwrite keeps retired mounts from surviving.
          secrets: ${{ vars.API_SECRET_BINDINGS }}
          secrets_update_strategy: overwrite

      - name: Show Cloud Run URL
        run: echo "docket-api=${{ steps.deploy-api.outputs.url }}"

      - name: Verify production health and auth routes
        env:
          API_URL: ${{ vars.API_URL }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 8 --retry-all-errors \
            --retry-delay 3 "$API_URL/v1/health" >/dev/null
          session_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "$API_URL/api/auth/get-session")"
          test "$session_status" = 200
          signup_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request POST "$API_URL/api/auth/sign-up/request-code" \
            --header 'Content-Type: application/json' \
            --data '{}')"
          case "$signup_status" in
            400|422) ;;
            *) echo "signup challenge probe returned HTTP $signup_status" >&2; exit 1 ;;
          esac

      - name: Ensure Cloud Scheduler jobs
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          API_URL: ${{ vars.API_URL }}
        run: npx -y tsx scripts/scheduler-setup.ts

  deploy-admin:
    name: Deploy admin
    needs: deploy-api
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}
            NEXT_PUBLIC_PASSKEY_RP_ID=${{ vars.PASSKEY_RP_ID }}

      - id: deploy-admin
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-admin
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
          env_vars_update_strategy: overwrite

      - name: Show Cloud Run URL
        run: echo "docket-admin=${{ steps.deploy-admin.outputs.url }}"
