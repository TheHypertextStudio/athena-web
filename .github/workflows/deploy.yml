name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docket

jobs:
  deploy-api:
    name: API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.2

      - uses: google-github-actions/auth@v2.1
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3.6

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6.3
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: NODE_VERSION=${{ steps.node-ver.outputs.value }}

      - uses: google-github-actions/deploy-cloudrun@v2.3
        with:
          service: docket-api
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
            API_URL=${{ vars.API_URL }}
            BETTER_AUTH_URL=${{ vars.API_URL }}
            BETTER_AUTH_TRUSTED_ORIGINS=${{ vars.WEB_URL }},${{ vars.ADMIN_URL }}
            BETTER_AUTH_PASSKEY_RP_ID=${{ vars.PASSKEY_RP_ID }}
            BETTER_AUTH_PASSKEY_RP_NAME=Docket
            BILLING_ENABLED=false
            MCP_TASKS_ENABLED=false
            MCP_CIMD_STRICT=true
          secrets: |
            DATABASE_URL=docket-database-url:latest
            BETTER_AUTH_SECRET=docket-auth-secret:latest
            CRON_SECRET=docket-cron-secret:latest

  deploy-web:
    name: Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.2

      - uses: google-github-actions/auth@v2.1
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3.6

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: docket-web
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/web:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production

  deploy-admin:
    name: Admin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4.2

      - uses: google-github-actions/auth@v2.1
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3.6

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: docket-admin
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
