name: Deploy production

on:
  workflow_call:

env:
  REGION: ${{ vars.GCP_REGION }}
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docket
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Migrate database and deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Build and push migration image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/db/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/migrate:${{ github.sha }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max
          build-args: NODE_VERSION=${{ steps.node-ver.outputs.value }}

      - name: Apply database migrations
        run: |
          gcloud run jobs deploy docket-db-migrate \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.REGISTRY }}/migrate:${{ github.sha }}" \
            --set-secrets=DATABASE_URL_UNPOOLED=docket-database-url-unpooled:latest \
            --tasks=1 \
            --max-retries=0 \
            --task-timeout=15m \
            --quiet
          gcloud run jobs execute docket-db-migrate \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --wait

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: NODE_VERSION=${{ steps.node-ver.outputs.value }}

      - id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-api
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production
            API_URL=${{ vars.API_URL }}
            WEB_URL=${{ vars.WEB_URL }}
            BETTER_AUTH_URL=${{ vars.API_URL }}
            BETTER_AUTH_TRUSTED_ORIGINS=${{ vars.WEB_URL }}\,${{ vars.ADMIN_URL }}
            BETTER_AUTH_ALLOWED_HOSTS=${{ vars.BETTER_AUTH_ALLOWED_HOSTS }}
            BETTER_AUTH_PASSKEY_RP_ID=${{ vars.PASSKEY_RP_ID }}
            BETTER_AUTH_PASSKEY_RP_NAME=Docket
            GOOGLE_CALENDAR_WEBHOOK_URL=${{ vars.API_URL }}/webhooks/calendar/google
            GOOGLE_OAUTH_PUBLIC=${{ vars.GOOGLE_OAUTH_PUBLIC }}
            GOOGLE_OAUTH_TEST_EMAILS=${{ vars.GOOGLE_OAUTH_TEST_EMAILS }}
            BILLING_ENABLED=false
            MCP_ALLOWED_ORIGINS=${{ vars.WEB_URL }}\,https://claude.ai\,https://claude.com
            MCP_TASKS_ENABLED=false
            MCP_CIMD_STRICT=true
          secrets: |
            DATABASE_URL=docket-database-url:latest
            BETTER_AUTH_SECRET=docket-auth-secret:latest
            CRON_SECRET=docket-cron-secret:latest
            GOOGLE_CLIENT_ID=docket-google-client-id:latest
            GOOGLE_CLIENT_SECRET=docket-google-client-secret:latest
            GITHUB_APP_ID=docket-github-app-id:latest
            GITHUB_APP_SLUG=docket-github-app-slug:latest
            GITHUB_APP_CLIENT_ID=docket-github-app-client-id:latest
            GITHUB_APP_CLIENT_SECRET=docket-github-app-client-secret:latest
            GITHUB_APP_PRIVATE_KEY=docket-github-app-private-key:latest
            GITHUB_APP_WEBHOOK_SECRET=docket-github-app-webhook-secret:latest
            LINEAR_CLIENT_ID=docket-linear-client-id:latest
            LINEAR_CLIENT_SECRET=docket-linear-client-secret:latest
            APPLE_CLIENT_ID=docket-apple-client-id:latest
            APPLE_TEAM_ID=docket-apple-team-id:latest
            APPLE_KEY_ID=docket-apple-key-id:latest
            APPLE_PRIVATE_KEY=docket-apple-private-key:latest

      - name: Show Cloud Run URL
        run: echo "docket-api=${{ steps.deploy-api.outputs.url }}"

      - name: Ensure Cloud Scheduler jobs
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          API_URL: ${{ vars.API_URL }}
        run: npx -y tsx scripts/scheduler-setup.ts

  deploy-admin:
    name: Deploy admin
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: node-ver
        run: echo "value=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,scope=admin,mode=max
          build-args: |
            NODE_VERSION=${{ steps.node-ver.outputs.value }}
            API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.WEB_URL }}

      - id: deploy-admin
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: docket-admin
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/admin:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
          env_vars: |
            NODE_ENV=production
            APP_MODE=production

      - name: Show Cloud Run URL
        run: echo "docket-admin=${{ steps.deploy-admin.outputs.url }}"

  deploy-web:
    name: Deploy web to Vercel
    needs: deploy-api
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - run: npm install --global vercel@50.19.1

      - name: Pull production configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build production web artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production web artifact
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
