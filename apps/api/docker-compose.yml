# Docker Compose for Athena API local development
# Usage: docker compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: athena-postgres
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena_dev_password
      POSTGRES_DB: athena_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U athena -d athena_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  # Athena API (for production-like testing)
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: athena-api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://athena:athena_dev_password@postgres:5432/athena_dev
      BETTER_AUTH_SECRET: dev-secret-change-in-production-32chars
      BETTER_AUTH_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

networks:
  default:
    name: athena-network
